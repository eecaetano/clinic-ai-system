<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Atendimento</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:30px;
}

h1{
margin-bottom:20px;
}

#chatContainer{
background:white;
height:400px;
overflow-y:auto;
border:1px solid #ccc;
padding:10px;
margin-bottom:10px;
}

.message{
padding:8px;
margin-bottom:5px;
border-radius:5px;
}

.user{
background:#d1ecf1;
text-align:right;
}

.bot{
background:#e2e3e5;
text-align:left;
}

#messageInput{
width:70%;
padding:10px;
}

button{
padding:10px 15px;
margin-left:5px;
}

#callArea{
margin-top:20px;
padding:15px;
background:white;
border:1px solid #ccc;
}

</style>

</head>

<body>

<h1>Atendimento</h1>

<div id="chatContainer"></div>

<input id="messageInput" placeholder="Digite a mensagem">

<button onclick="sendMessage()">
Enviar
</button>

<div id="callArea">

<h3>Chamada</h3>

<button id="startCall">
Iniciar chamada
</button>

<p id="callStatus">
Status: parado
</p>

</div>

<script>

const chat=document.getElementById("chatContainer");

function addMessage(text,type){

const div=document.createElement("div");

div.classList.add("message");
div.classList.add(type);

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function sendMessage(){

const input=document.getElementById("messageInput");

const text=input.value;

if(!text)return;

addMessage(text,"user");

input.value="";

setTimeout(()=>{

addMessage("Recebemos sua mensagem. Em breve vamos responder.","bot");

},500);

}

document.getElementById("startCall").onclick=()=>{

console.log("iniciando chamada");

document.getElementById("callStatus").innerText="Status: chamada iniciada";

};

</script>

</body>

</html>
