<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Atendimentos</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial, sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
  height:100vh;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-right:1px solid rgba(255,255,255,0.1);
  padding:30px;
  display:flex;
  flex-direction:column;
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:40px;
  letter-spacing:1px;
}

.menu a{
  display:block;
  text-decoration:none;
  color:white;
  padding:12px 15px;
  margin-bottom:10px;
  border-radius:8px;
  transition:0.3s;
}

.menu a:hover{
  background:rgba(255,255,255,0.15);
  transform:translateX(5px);
}

/* MAIN */
.main{
  flex:1;
  padding:40px;
  overflow-y:auto;
}

.header{
  font-size:28px;
  font-weight:600;
  margin-bottom:30px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:25px;
  border-radius:14px;
  backdrop-filter:blur(10px);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-8px);
  background:rgba(255,255,255,0.08);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card h3{
  margin-bottom:10px;
}

.card p{
  opacity:0.8;
  font-size:14px;
}

/* STATUS AREA */
.status{
  margin-top:40px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  padding:25px;
  border:1px solid rgba(255,255,255,0.1);
}

.status h2{
  margin-bottom:15px;
}

.system-indicator{
  display:flex;
  align-items:center;
  gap:10px;
}

.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 10px #22c55e;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{opacity:0.5}
  50%{opacity:1}
  100%{opacity:0.5}
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  overflow:hidden;
  margin-top:20px;
}

th, td{
  padding:12px;
  text-align:left;
}

th{
  background:rgba(255,255,255,0.1);
  color:#00f6ff;
}

tr:nth-child(even){
  background:rgba(255,255,255,0.02);
}

tr:hover{
  background:rgba(255,255,255,0.08);
  cursor:pointer;
}

/* INPUTS & BUTTON */
input, button{
  padding:10px;
  border-radius:8px;
  border:none;
}

input{
  background:rgba(255,255,255,0.05);
  color:white;
  flex:1;
  min-width:150px;
}

button{
  background:#00f6ff;
  color:#0d0d0f;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#00c2d6;
}

.form-container{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* NOTIFICATIONS */
.notification{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00f6ff;
  color:#0d0d0f;
  padding:10px 20px;
  border-radius:10px;
  box-shadow:0 0 15px #00f6ff;
  font-weight:600;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Clinica Pet</div>
  <div class="menu">
    <a href="index.html">🏠 Dashboard</a>
    <a href="pacientes.html">🐾 Pacientes</a>
    <a href="agenda.html">📅 Agenda</a>
    <a href="atendimento.html">💬 Atendimentos</a>
    <a href="configuracoes.html">⚙ Configurações</a>
  </div>
</div>

<div class="main">
  <div class="header">Atendimentos Ativos</div>

  <div class="form-container">
    <input id="pet" placeholder="Nome do Pet">
    <input id="owner" placeholder="Nome do Dono">
    <input id="status" placeholder="Status do Atendimento">
    <button onclick="addAtendimento()">Adicionar</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Pet</th>
        <th>Dono</th>
        <th>Status</th>
        <th>ID</th>
      </tr>
    </thead>
    <tbody id="atendimentoList"></tbody>
  </table>

  <div id="notifications"></div>
</div>

<script>
const APP_WEB_URL = 'https://script.google.com/macros/s/AKfycbyEAFekPB9P5MGhV_SOiCFypV7RKKb_hUwH5gmh7nM5kal_Re7Dhefd_KzpYtA9aReLvg/exec';
const SHEET_ABA = 'Atendimentos';

function novaNotificacao(msg){
  const notificationsEl=document.getElementById("notifications");
  const notif=document.createElement("div");
  notif.className="notification";
  notif.textContent=msg;
  notificationsEl.appendChild(notif);
  setTimeout(()=>notif.remove(),4000);
}

async function carregarAtendimentos(){
  try{
    const res=await fetch(`${APP_WEB_URL}?action=${SHEET_ABA}`);
    const data=await res.json();

    if(!Array.isArray(data)){
      console.error("Erro: Dados recebidos não são um array",data);
      novaNotificacao("Erro ao carregar atendimentos ❌");
      return;
    }

    const registros=data.slice(1); // remove cabeçalho
    const container=document.getElementById("atendimentoList");
    container.innerHTML="";

    registros.forEach(item=>{
      const row=document.createElement("tr");
      row.innerHTML=`<td>${item[1]}</td><td>${item[2]}</td><td>${item[3]}</td><td>${item[0]}</td>`;
      container.appendChild(row);
    });

  }catch(err){
    console.error("Erro ao carregar atendimentos:",err);
    novaNotificacao("Erro ao carregar atendimentos ❌");
  }
}

async function addAtendimento(){
  const pet=document.getElementById("pet").value;
  const owner=document.getElementById("owner").value;
  const status=document.getElementById("status").value;

  if(!pet || !owner || !status){
    novaNotificacao("Preencha todos os campos!");
    return;
  }

  try{
    const res=await fetch(`${APP_WEB_URL}?action=addAtendimento&pet=${encodeURIComponent(pet)}&owner=${encodeURIComponent(owner)}&status=${encodeURIComponent(status)}`);
    const result=await res.json();
    if(result.success){
      novaNotificacao("Atendimento adicionado ✅");
      carregarAtendimentos();
      document.getElementById("pet").value="";
      document.getElementById("owner").value="";
      document.getElementById("status").value="";
    }else{
      novaNotificacao("Erro ao adicionar atendimento ❌");
    }
  }catch(err){
    console.error("Erro ao adicionar atendimento:",err);
    novaNotificacao("Erro ao adicionar atendimento ❌");
  }
}

carregarAtendimentos();
</script>

</body>
</html>
