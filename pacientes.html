<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Pacientes</title>

<!-- Fonte futurista -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
height:100vh;
color:white;
display:flex;

}

/* SIDEBAR */

.sidebar{

width:260px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-right:1px solid rgba(255,255,255,0.1);

padding:30px;
display:flex;
flex-direction:column;

}

.logo{

font-size:22px;
font-weight:700;
margin-bottom:40px;
letter-spacing:1px;

}

.menu a{

display:block;
text-decoration:none;
color:white;
padding:12px 15px;
margin-bottom:10px;
border-radius:8px;
transition:0.3s;

}

.menu a:hover{

background:rgba(255,255,255,0.15);
transform:translateX(5px);

}

/* MAIN */

.main{

flex:1;
padding:40px;

}

.header{

font-size:28px;
font-weight:600;

margin-bottom:30px;

}

  h1 {
    text-align: center;
    font-weight: 600;
    font-size: 2em;
    color: #00f6ff;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00f6ff;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .top-bar button {
    background: #00f6ff;
    color: #0d0d0f;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
  }

  .top-bar button:hover {
    background: #00c2d6;
  }

  .form-container {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .form-container input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    flex: 1;
    min-width: 150px;
    background: #1a1a1f;
    color: #e0e0e0;
  }

  .form-container button {
    background: #00f6ff;
    color: #0d0d0f;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
  }

  .form-container button:hover {
    background: #00c2d6;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #1a1a1f;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0, 246, 255, 0.2);
  }

  th, td {
    padding: 15px;
    text-align: left;
  }

  th {
    background: #111;
    color: #00f6ff;
    text-transform: uppercase;
  }

  tr:nth-child(even) {
    background: #141418;
  }

  tr:hover {
    background: #0d0d0f;
    cursor: pointer;
  }

  .notification {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00f6ff;
    color: #0d0d0f;
    padding: 10px 20px;
    border-radius: 10px;
    box-shadow: 0 0 15px #00f6ff;
    font-weight: 600;
    opacity: 0.9;
  }
</style>
</head>

<body>

<div class="top-bar">
  <button onclick="window.location.href='index.html'">🔙 Voltar</button>
  <h1>Pacientes Cadastrados</h1>
</div>

<div class="form-container">
  <input id="petName" placeholder="Nome do Pet">
  <input id="ownerName" placeholder="Nome do Dono">
  <input id="phone" placeholder="Telefone">
  <button onclick="addPatient()">Cadastrar</button>
</div>

<table>
  <thead>
    <tr>
      <th>Pet</th>
      <th>Dono</th>
      <th>Telefone</th>
    </tr>
  </thead>
  <tbody id="patientList"></tbody>
</table>

<div id="notifications"></div>

<script>
const APP_WEB_URL = 'https://script.google.com/macros/s/AKfycbwEMX7UrDj1GOeW4a_4GyOagGlndy9rcFsBOgXwH6Ef1DUfagUvdbDip8VUWadw5V4JEA/exec';
const SHEET_ABA = 'pacientes';

// Carregar pacientes reais do Google Sheets
async function carregarPacientes() {
  try {
    const res = await fetch(`${APP_WEB_URL}?action=pacientes`);
    const data = await res.json();
    const container = document.getElementById("patientList");
    container.innerHTML = "";
    data.forEach(p => {
      const row = document.createElement("tr");
      row.innerHTML = `<td>${p[0]}</td><td>${p[3]}</td><td>${p[5]}</td>`;
      container.appendChild(row);
    });
  } catch(err) {
    console.error("Erro ao carregar pacientes:", err);
    novaNotificacao("Erro ao carregar pacientes ❌");
  }
}

// Cadastrar paciente no Google Sheets
async function addPatient() {
  const pet = document.getElementById("petName").value;
  const owner = document.getElementById("ownerName").value;
  const phone = document.getElementById("phone").value;

  if(!pet || !owner || !phone) {
    novaNotificacao("Preencha todos os campos!");
    return;
  }

  try {
    const res = await fetch(`${APP_WEB_URL}?action=addPaciente&pet=${encodeURIComponent(pet)}&owner=${encodeURIComponent(owner)}&phone=${encodeURIComponent(phone)}`);
    const result = await res.json();
    if(result.success) {
      novaNotificacao("Paciente cadastrado com sucesso ✅");
      carregarPacientes();
      document.getElementById("petName").value = "";
      document.getElementById("ownerName").value = "";
      document.getElementById("phone").value = "";
    }
  } catch(err) {
    console.error("Erro ao cadastrar paciente:", err);
    novaNotificacao("Erro ao cadastrar paciente ❌");
  }
}

// Função para mostrar notificações
function novaNotificacao(msg) {
  const notificationsEl = document.getElementById("notifications");
  const notif = document.createElement("div");
  notif.className = "notification";
  notif.textContent = msg;
  notificationsEl.appendChild(notif);
  setTimeout(() => notif.remove(), 4000);
}

// Carregar pacientes ao abrir a página
carregarPacientes();
</script>

</body>
</html>
