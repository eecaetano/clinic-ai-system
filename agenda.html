<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI, Arial, sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#1e293b,#020617);height:100vh;color:white;display:flex;}
.sidebar{width:260px;background:rgba(255,255,255,0.05);backdrop-filter:blur(15px);border-right:1px solid rgba(255,255,255,0.1);padding:30px;display:flex;flex-direction:column;}
.logo{font-size:22px;font-weight:700;margin-bottom:40px;letter-spacing:1px;}
.menu a{display:block;text-decoration:none;color:white;padding:12px 15px;margin-bottom:10px;border-radius:8px;transition:0.3s;}
.menu a:hover{background:rgba(255,255,255,0.15);transform:translateX(5px);}
.main{flex:1;padding:40px;overflow-y:auto;}
.header{font-size:28px;font-weight:600;margin-bottom:30px;}
.form-container{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
input, button{padding:10px;border-radius:8px;border:none;}
input{background:rgba(255,255,255,0.05);color:white;flex:1;min-width:150px;}
button{background:#00f6ff;color:#0d0d0f;font-weight:600;cursor:pointer;transition:0.3s;}
button:hover{background:#00c2d6;}
table{width:100%;border-collapse:collapse;background:rgba(255,255,255,0.05);border-radius:12px;overflow:hidden;}
th, td{padding:12px;text-align:left;}
th{background:rgba(255,255,255,0.1);color:#00f6ff;}
tr:nth-child(even){background:rgba(255,255,255,0.02);}
tr:hover{background:rgba(255,255,255,0.08);cursor:pointer;}
.notification{position:fixed;bottom:20px;right:20px;background:#00f6ff;color:#0d0d0f;padding:10px 20px;border-radius:10px;box-shadow:0 0 15px #00f6ff;font-weight:600;opacity:0.9;}
</style>
</head>

<body>
<div class="sidebar">
  <div class="logo">Clinica Pet</div>
  <div class="menu">
    <a href="index.html">🏠 Dashboard</a>
    <a href="pacientes.html">🐾 Pacientes</a>
    <a href="agenda.html">📅 Agenda</a>
    <a href="atendimento.html">💬 Atendimentos</a>
    <a href="configuracoes.html">⚙ Configurações</a>
  </div>
</div>

<div class="main">
  <div class="header">Agenda de Consultas</div>

  <div class="form-container">
    <input id="hora" placeholder="Horário (09:00)">
    <input id="pet" placeholder="Nome do Pet">
    <input id="dono" placeholder="Dono">
    <button onclick="addConsulta()">Adicionar</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Horário</th>
        <th>Pet</th>
        <th>Dono</th>
      </tr>
    </thead>
    <tbody id="appointmentList"></tbody>
  </table>

  <div id="notifications"></div>
</div>

<script>
const APP_WEB_URL='https://script.google.com/macros/s/AKfycbwEMX7UrDj1GOeW4a_4GyOagGlndy9rcFsBOgXwH6Ef1DUfagUvdbDip8VUWadw5V4JEA/exec';
const SHEET_ABA='Consultas';

function novaNotificacao(msg){
  const notificationsEl=document.getElementById("notifications");
  const notif=document.createElement("div");
  notif.className="notification";
  notif.textContent=msg;
  notificationsEl.appendChild(notif);
  setTimeout(()=>notif.remove(),4000);
}

async function carregarConsultas(){
  try{
    const res=await fetch(`${APP_WEB_URL}?action=${SHEET_ABA}`);
    const data=await res.json();
    if(!Array.isArray(data)){ novaNotificacao("Erro ao carregar agenda ❌"); return; }
    const registros=data.slice(1);
    const container=document.getElementById("appointmentList");
    container.innerHTML="";
    registros.forEach(item=>{
      const row=document.createElement("tr");
      row.innerHTML=`<td>${item[0]}</td><td>${item[1]}</td><td>${item[2]}</td><td>${item[3]}</td>`;
      container.appendChild(row);
    });
  }catch(err){
    console.error("Erro ao carregar agenda:",err);
    novaNotificacao("Erro ao carregar agenda ❌");
  }
}

async function addConsulta(){
  const hora=document.getElementById("hora").value;
  const pet=document.getElementById("pet").value;
  const dono=document.getElementById("dono").value;

  if(!hora || !pet || !dono){ novaNotificacao("Preencha todos os campos!"); return; }

  try{
    const res=await fetch(`${APP_WEB_URL}?action=addConsulta&hora=${encodeURIComponent(hora)}&pet=${encodeURIComponent(pet)}&dono=${encodeURIComponent(dono)}`);
    const result=await res.json();
    if(result.success){
      novaNotificacao("Consulta adicionada ✅");
      carregarConsultas();
      document.getElementById("hora").value="";
      document.getElementById("pet").value="";
      document.getElementById("dono").value="";
    }else{
      novaNotificacao("Erro ao adicionar consulta ❌");
    }
  }catch(err){
    console.error("Erro ao adicionar consulta:",err);
    novaNotificacao("Erro ao adicionar consulta ❌");
  }
}

carregarConsultas();
</script>
</body>
</html>
